{% extends "base.html" %}

{% block content %}
<div class="container pp-container" style="max-width: 1080px; margin-top: 2rem; margin-bottom: 4rem;">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, message in messages %}
        <div class="alert alert-{{ 'danger' if category == 'error' else category }}">{{ message }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}

  {% block monetization_content %}{% endblock %}
</div>
{% endblock %}
